/* ---------- ÉTAT GLOBAL ---------- */

let userData = null;

/* ---------- FONCTIONS UTILITAIRES DE BASE ---------- */
function escHtml(s) {
  if (!s) return '';
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#039;');
}

function stripHtml(html) {
  const div = document.createElement('div');
  div.innerHTML = html;
  return div.textContent || '';
}

function triggerDownload(blob, filename) {
  const url = URL.createObjectURL(blob);
  const a = Object.assign(document.createElement('a'), { href: url, download: filename });
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  setTimeout(() => URL.revokeObjectURL(url), 1000);
}

function togglePwVis(id) {
  const input = document.getElementById(id);
  if (input) input.type = input.type === 'password' ? 'text' : 'password';
}

/* ---------- TOAST & LOADER ---------- */
function showToast(msg, type = 'info') {
  const container = document.getElementById('toast-container');
  if (!container) return;
  const toast = document.createElement('div');
  toast.className = 'toast ' + type;
  toast.textContent = msg;
  container.appendChild(toast);
  setTimeout(() => {
    toast.style.opacity = '0';
    setTimeout(() => toast.remove(), 300);
  }, 2800);
}

function showLoader(msg) {
  const loader = document.getElementById('global-loader');
  const text = document.getElementById('loader-text');
  if (loader) loader.classList.add('active');
  if (text) text.textContent = msg || 'Chargement…';
}
function hideLoader() {
  const loader = document.getElementById('global-loader');
  if (loader) loader.classList.remove('active');
}

/* ---------- MODALES ---------- */
function openModal(id) {
  const el = document.getElementById(id);
  if (el) el.classList.add('active');
}
function closeModal(id) {
  const el = document.getElementById(id);
  if (el) el.classList.remove('active');
}
// Fermeture en cliquant sur l'overlay (sauf pour le premier onboarding)
document.querySelectorAll('.modal-overlay').forEach(ov => {
  ov.addEventListener('click', e => {
    if (e.target === ov && ov.id !== 'cgu-first-modal') ov.classList.remove('active');
  });
});

/* ---------- GESTION DU STOCKAGE ---------- */
function getUsers() {
  try {
    return JSON.parse(localStorage.getItem(CONFIG.USERS_KEY) || '[]');
  } catch {
    return [];
  }
}
function saveUsers(users) {
  localStorage.setItem(CONFIG.USERS_KEY, JSON.stringify(users));
}
function getUID() {
  return localStorage.getItem(CONFIG.UID_KEY);
}
function setUID(id) {
  if (id) localStorage.setItem(CONFIG.UID_KEY, id);
  else localStorage.removeItem(CONFIG.UID_KEY);
}
function loadUD(uid) {
  try {
    return JSON.parse(localStorage.getItem(CONFIG.DATA_PREFIX + uid) || 'null');
  } catch {
    return null;
  }
}
function saveUserData() {
  if (!currentUser || !userData) return;
  localStorage.setItem(CONFIG.DATA_PREFIX + currentUser.id, JSON.stringify(userData));
}
// Debounce pour éviter trop d'écritures
let saveDebounceTimer;
function debouncedSaveUserData() {
  clearTimeout(saveDebounceTimer);
  saveDebounceTimer = setTimeout(() => {
    saveUserData();
  }, 300);
}

function defaultUD() {
  return {
    isPremium: false,
    scansUsed: 0,
    scansMonth: new Date().getMonth(),
    history: [],
    settings: {
      theme: 'obsidian',
      uiLang: 'fr',
      aiLang: 'fr',
      aiTone: 'formal',
      notif: true,
      autosave: true,
      mock: false,
      autoNight: false,
      docFormat: 'a4',

    apiKey: '',
    badges: [],
    totalScans: 0,
    totalTimeSaved: 0,
    savedSignature: null,

    logs: [],
    cguAccepted: false,

    premiumActivatedAt: null,

}

/* ---------- LOGGING ---------- */
function addLog(msg) {
  if (!userData) return;
  const ts = new Date().toLocaleTimeString('fr-FR');
  userData.logs.push('[' + ts + '] ' + msg);
  if (userData.logs.length > 100) userData.logs = userData.logs.slice(-100);
  debouncedSaveUserData();
}

/* ---------- HASHAGE MOT DE PASSE (amélioré) ---------- */
async function hashPw(password) {
  // Utilise SHA-256 si disponible (nécessite HTTPS), sinon fallback
  if (window.crypto && window.crypto.subtle) {
    const encoder = new TextEncoder();
    const data = encoder.encode(password + 'fd2025salt');
    const hash = await crypto.subtle.digest('SHA-256', data);
    return Array.from(new Uint8Array(hash)).map(b => b.toString(16).padStart(2, '0')).join('');
  } else {
    // Fallback moins sûr mais compatible
    return btoa(encodeURIComponent(password) + 'fd2025salt');
  }
}

/* ---------- AUTH ---------- */
function authTab(tab) {
  const loginForm = document.getElementById('auth-login-form');
  const registerForm = document.getElementById('auth-register-form');
  const tabLogin = document.getElementById('tab-login');
  const tabRegister = document.getElementById('tab-register');
  if (tab === 'login') {
    loginForm.style.display = 'flex';
    registerForm.style.display = 'none';
    tabLogin.classList.add('active');
    tabRegister.classList.remove('active');
  } else {
    loginForm.style.display = 'none';
    registerForm.style.display = 'flex';
    tabLogin.classList.remove('active');
    tabRegister.classList.add('active');
  }
}

async function doLogin() {
  const email = document.getElementById('login-email').value.trim();
  const pw = document.getElementById('login-password').value;
  if (!email || !pw) {
    showToast('Email et mot de passe requis', 'error');
    return;
  }
  const users = getUsers();
  const user = users.find(u => u.email === email.toLowerCase());
  if (!user) {
    showToast('Email ou mot de passe incorrect', 'error');
    return;
  }
  const hashed = await hashPw(pw);
  if (user.passwordHash !== hashed) {
    showToast('Email ou mot de passe incorrect', 'error');
    return;
  }
  loginUser(user);
}

async function doRegister() {
  const name = document.getElementById('reg-name').value.trim();
  const email = document.getElementById('reg-email').value.trim();
  const pw = document.getElementById('reg-password').value;
  const confirm = document.getElementById('reg-confirm').value;
  const cgu = document.getElementById('reg-cgu').checked;

  if (!name || !email || !pw) {
    showToast('Tous les champs sont requis', 'error');
    return;
  }
  if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
    showToast('Email invalide', 'error');
    return;
  }
  if (pw !== confirm) {
    showToast('Les mots de passe ne correspondent pas', 'error');
    return;
  }
  if (pw.length < 6) {
    showToast('Mot de passe trop court (min 6 car.)', 'error');
    return;
  }
  if (!cgu) {
    showToast('Veuillez accepter les CGU', 'error');
    return;
  }
  const users = getUsers();
  if (users.find(u => u.email === email.toLowerCase())) {
    showToast('Cet email est déjà utilisé', 'error');
    return;
  }
  const hashed = await hashPw(pw);
  const user = {
    id: 'u_' + Date.now(),
    email: email.toLowerCase(),
    name,
    passwordHash: hashed,
    isGuest: false,
    createdAt: new Date().toISOString(),
  };
  users.push(user);
  saveUsers(users);
  const ud = defaultUD();
  ud.settings.uiLang = currentLang;
  localStorage.setItem(CONFIG.DATA_PREFIX + user.id, JSON.stringify(ud));
  loginUser(user);
  addLog('Compte créé: ' + email);
}

async function doGuest() {
  const id = 'guest_' + Date.now();
  const user = {
    id,
    email: null,
    name: 'Invité',
    isGuest: true,
    createdAt: new Date().toISOString(),
  };
  const users = getUsers();
  users.push(user);
  saveUsers(users);
  const ud = defaultUD();
  ud.settings.uiLang = currentLang;
  localStorage.setItem(CONFIG.DATA_PREFIX + id, JSON.stringify(ud));
  loginUser(user);
  addLog('Connexion invité');
}

function loginUser(user) {
  currentUser = user;
  setUID(user.id);
  const stored = loadUD(user.id);
  userData = stored ? Object.assign(defaultUD(), stored) : defaultUD();
  const nowM = new Date().getMonth();
  if (userData.scansMonth !== nowM) {
    userData.scansUsed = 0;
    userData.scansMonth = nowM;
    saveUserData();
  }
  currentLang = userData.settings.uiLang || 'fr';
  applyI18n();
  applyTheme(userData.settings.theme || 'aurora');
  setupAutoNight();
  document.getElementById('auth-screen').classList.add('layer-hidden');
  document.getElementById('app').classList.remove('layer-hidden');
  initApp();
  addLog('Connexion: ' + (user.email || 'invité'));
  if (location.search.includes('premium=success')) {
    userData.isPremium = true;
    userData.premiumActivatedAt = new Date().toISOString();
    saveUserData();
    showToast('Premium activé via Lemon Squeezy ✓', 'success');
    history.replaceState(null, '', location.pathname);
  }
}

function logout() {
  if (!confirm('Se déconnecter ?')) return;
  setUID(null);
  currentUser = null;
  userData = null;
  document.getElementById('app').classList.add('layer-hidden');
  document.getElementById('auth-screen').classList.remove('layer-hidden');
  showToast('Déconnecté', 'info');
}

function deleteAccount() {
  if (!confirm('Supprimer définitivement votre compte et toutes vos données ?')) return;
  if (currentUser) {
    const users = getUsers().filter(u => u.id !== currentUser.id);
    saveUsers(users);
    localStorage.removeItem(CONFIG.DATA_PREFIX + currentUser.id);
    setUID(null);
    currentUser = null;
    userData = null;
  }
  document.getElementById('app').classList.add('layer-hidden');
  document.getElementById('auth-screen').classList.remove('layer-hidden');
  showToast('Compte supprimé', 'info');
}

function doForgotPassword() {
  const email = document.getElementById('forgot-email').value.trim();
  if (!email) {
    showToast('Email requis', 'error');
    return;
  }
  const users = getUsers();
  const user = users.find(u => u.email === email.toLowerCase());
  if (!user) {
    showToast('Aucun compte trouvé', 'error');
    return;
  }
  // Génération d'un nouveau mot de passe temporaire (simulation)
  const newPw = Math.random().toString(36).slice(-8);
  // Ici on ne peut pas envoyer de mail, on affiche simplement
  showToast('Nouveau mot de passe : ' + newPw + ' (notez-le !)', 'info');
  addLog('Mot de passe réinitialisé: ' + email);
  closeModal('forgot-modal');
}

function checkPwStrength(pw) {
  const bars = [1, 2, 3, 4].map(i => document.getElementById('pw-bar-' + i));
  const hint = document.getElementById('pw-hint');
  let score = 0;
  if (pw.length >= 6) score++;
  if (pw.length >= 10) score++;
  if (/[A-Z]/.test(pw) && /[0-9]/.test(pw)) score++;
  if (/[^A-Za-z0-9]/.test(pw)) score++;
  const colors = ['#ef4444', '#f97316', '#eab308', '#22c55e'];
  const labels = ['Faible', 'Moyen', 'Bon', 'Fort'];
  bars.forEach((b, i) => {
    if (b) b.style.background = i < score ? colors[score - 1] : 'var(--surface2)';
  });
  if (hint && score > 0) hint.textContent = labels[score - 1];
}

function updateProfilePhoto(event) {
  const file = event.target.files[0];
  if (!file) return;
  if (file.size > CONFIG.MAX_IMAGE_SIZE) {
    showToast('Image trop volumineuse (max 5 Mo)', 'error');
    return;
  }
  const reader = new FileReader();
  reader.onload = e => {
    userData.photo = e.target.result;
    saveUserData();
    renderProfilePhoto();
    showToast('Photo mise à jour ✓', 'success');
  };
  reader.readAsDataURL(file);
  event.target.value = '';
}

function renderProfilePhoto() {
  const disp = document.getElementById('profile-photo-display');
  const hicon = document.getElementById('header-photo-icon');
  const hphoto = document.getElementById('header-photo');
  const photo = userData && userData.photo;
  if (disp) {
    if (photo) disp.innerHTML = `<img src="${photo}" alt="" style="width:72px;height:72px;border-radius:50%;object-fit:cover;"/>`;
    else disp.textContent = '👤';
  }
  if (hphoto && hicon) {
    if (photo) {
      hphoto.src = photo;
      hphoto.style.display = 'block';
      hicon.style.display = 'none';
    } else {
      hphoto.style.display = 'none';
      hicon.style.display = 'block';
    }
  }
}

/* ---------- I18N ---------- */
const TR = {
  fr: { /* ... vos traductions ... */ },
  en: { /* ... */ },
  es: { /* ... */ }
};
let currentLang = 'fr';

function t(key) {
  return (TR[currentLang] || TR.fr)[key] || TR.fr[key] || key;
}

function applyI18n() {
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const k = el.getAttribute('data-i18n');
    if (k) el.textContent = t(k);
  });
  document.querySelectorAll('[data-i18n-t]').forEach(el => {
    const k = el.getAttribute('data-i18n-t');
    if (k) el.textContent = t(k);
  });
  document.documentElement.lang = currentLang;
}

function setUILang(lang, btn) {
  currentLang = lang;
  applyI18n();
  document.querySelectorAll('.ui-lang-btn').forEach(b => b.classList.remove('selected'));
  document.querySelectorAll('.ui-lang-btn').forEach(b => {
    if (b.onclick && b.onclick.toString().includes(`'${lang}'`)) b.classList.add('selected');
  });
  const hs = document.getElementById('history-search');
  if (hs) hs.placeholder = '🔍 ' + t('search');
  if (userData) {
    userData.settings.uiLang = lang;
    debouncedSaveUserData();
  }
}

function cycleLang() {
  const langs = ['fr', 'en', 'es'];
  const next = langs[(langs.indexOf(currentLang) + 1) % langs.length];
  setUILang(next, null);
  showToast('Langue : ' + next.toUpperCase(), 'info');
}

/* ---------- GAMIFICATION ---------- */
const BADGES = [
  { id: 'explorateur', icon: '🚀', name: 'Explorateur', desc: 'Premier scan effectué' },
  { id: 'archiviste', icon: '📚', name: 'Archiviste', desc: '5 documents enregistrés' },
  { id: 'polyglotte', icon: '🌍', name: 'Polyglotte', desc: 'Première traduction effectuée' },
  { id: 'signataire', icon: '✍️', name: 'Signataire', desc: 'Première signature insérée' },
  { id: 'vip', icon: '⭐', name: 'VIP', desc: 'Premium activé' },
  { id: 'hibou', icon: '🦉', name: 'Hibou nocturne', desc: 'Thème sombre utilisé' },
  { id: 'exporteur', icon: '📤', name: 'Exporteur', desc: 'Premier export effectué' },
  { id: 'champion', icon: '🏆', name: 'Champion', desc: '25 scans au total' },
  { id: 'favori', icon: '💛', name: 'Collectionneur', desc: 'Premier favori ajouté' },
];

function checkBadge(id) {
  if (!userData || userData.badges.includes(id)) return;
  let ok = false;
  if (id === 'explorateur' && userData.totalScans >= 1) ok = true;
  if (id === 'archiviste' && userData.history.length >= 5) ok = true;
  if (id === 'polyglotte') ok = true; // simplifié
  if (id === 'signataire') ok = true;
  if (id === 'vip' && userData.isPremium) ok = true;
  if (id === 'hibou' && ['obsidian', 'galaxy', 'ember', 'jungle', 'sakura'].includes(userData.settings.theme)) ok = true;
  if (id === 'exporteur') ok = true;
  if (id === 'champion' && userData.totalScans >= 25) ok = true;
  if (id === 'favori') ok = true;
  if (!ok) return;
  userData.badges.push(id);
  debouncedSaveUserData();
  renderBadges();
  const badge = BADGES.find(b => b.id === id);
  if (badge) {
    document.getElementById('badge-modal-icon').textContent = badge.icon;
    document.getElementById('badge-modal-name').textContent = badge.name;
    document.getElementById('badge-modal-desc').textContent = badge.desc;
    setTimeout(() => openModal('badge-modal'), 600);
  }
}

function renderBadges() {
  const grid = document.getElementById('badges-grid');
  if (!grid || !userData) return;
  grid.innerHTML = BADGES.map(b => {
    const unlocked = userData.badges.includes(b.id);
    return `<div class="badge-item ${unlocked ? 'unlocked' : ''}"><div class="b-icon">${b.icon}</div><div class="b-name">${b.name}</div></div>`;
  }).join('');
  document.getElementById('stat-total-scans').textContent = userData.totalScans || 0;
  document.getElementById('stat-saved-docs').textContent = userData.history.length || 0;
  updateTimeSavedDisplay();
  updateWorldRank();
}

function updateTimeSavedDisplay() {
  if (!userData) return;
  const mins = userData.totalTimeSaved || 0;
  const h = Math.floor(mins / 60);
  const m = mins % 60;
  const label = h > 0 ? (h + 'h' + (m > 0 ? m + 'min' : '')) : (m + ' min');
  document.getElementById('home-time-saved').textContent = label;
  document.getElementById('stat-time-saved').textContent = label;
}

function updateWorldRank() {
  const el = document.getElementById('stat-world-rank');
  if (!el || !currentUser) return;
  const seed = currentUser.id.split('').reduce((a, c) => a + c.charCodeAt(0), 0);
  const rank = Math.floor(((seed * 9301 + 49297) % 233280) / 233280 * 49000) + 1000;
  el.textContent = '#' + rank.toLocaleString('fr-FR');
}

/* ---------- COMPTEUR DE SCANS ---------- */
function canScan() {
  const limit = userData.isPremium ? CONFIG.PREMIUM_LIMIT : CONFIG.FREE_LIMIT;
  return userData.scansUsed < limit;
}
function consumeScan() {
  userData.scansUsed++;
  userData.totalScans++;
  userData.totalTimeSaved += 3;
  debouncedSaveUserData();
  updateScanCounter();
  addLog('Scan consommé (total: ' + userData.totalScans + ')');
}
function updateScanCounter() {
  if (!userData) return;
  const limit = userData.isPremium ? CONFIG.PREMIUM_LIMIT : CONFIG.FREE_LIMIT;
  const remain = Math.max(0, limit - userData.scansUsed);
  const pct = Math.min(100, (userData.scansUsed / limit) * 100);
  const d = document.getElementById('scan-counter-display');
  if (d) {
    d.textContent = remain + ' ✦';
    d.className = 'scan-counter' + (remain <= 1 ? ' warning' : '');
  }
  document.getElementById('home-scan-progress').style.width = pct + '%';
  document.getElementById('home-scan-label').textContent = userData.scansUsed + ' / ' + limit;
  const badge = document.getElementById('home-scan-badge');
  if (badge) {
    badge.textContent = userData.isPremium ? '⭐ Premium' : t('free');
    badge.className = 'badge' + (userData.isPremium ? ' badge-premium' : '');
  }
}
function showLimitModal() {
  showToast('Limite atteinte ! Passez à Premium.', 'error');
  setTimeout(() => openModal('payment-modal'), 700);
}

/* ---------- THÈMES ---------- */
function applyTheme(name) {
  const valid = ['obsidian', 'sakura', 'jungle', 'galaxy', 'ember', 'aurora'];
  const theme = valid.includes(name) ? name : 'aurora';
  document.documentElement.removeAttribute('data-theme');
  if (theme !== 'aurora') document.documentElement.setAttribute('data-theme', theme);
  document.querySelectorAll('.theme-swatch').forEach(s => s.classList.toggle('selected', s.getAttribute('data-theme-id') === theme));
  const meta = document.querySelector('meta[name="theme-color"]');
  const colors = { obsidian: '#0a0a0f', sakura: '#1a0d12', jungle: '#040d07', galaxy: '#04020e', ember: '#0d0600', aurora: '#f5f3ff' };
  if (meta) meta.content = colors[theme] || '#0a0a0f';
}
let nightMQ = null;
function nightHandler(e) {
  applyTheme(e.matches ? 'obsidian' : (userData?.settings?.theme || 'aurora'));
}
function setupAutoNight() {
  if (!userData) return;
  if (nightMQ) {
    try { nightMQ.removeEventListener('change', nightHandler); } catch (e) {}
  }
  if (userData.settings.autoNight) {
    nightMQ = window.matchMedia('(prefers-color-scheme: dark)');
    nightHandler({ matches: nightMQ.matches });
    nightMQ.addEventListener('change', nightHandler);
  }
}

/* ---------- IA ---------- */
async function callClaudeAPI(messages) {
  const response = await fetch(CONFIG.API_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ model: CONFIG.API_MODEL, max_tokens: 2048, messages })
  });
  if (!response.ok) {
    const err = await response.json().catch(() => ({}));
    throw new Error(err.error?.message || 'HTTP ' + response.status);
  }
  const data = await response.json();
  const text = data.content?.[0]?.text || '';
  if (!text) throw new Error('Réponse vide');
  return text;
}

async function processWithClaude(input, inputType = 'text') {
  if (!canScan()) {
    showLimitModal();
    return;
  }
  const lang = userData.settings.aiLang || 'fr';
  const tone = userData.settings.aiTone || 'formal';
  const langNames = { fr: 'français', en: 'anglais', es: 'espagnol', de: 'allemand', it: 'italien', pt: 'portugais', nl: 'néerlandais', pl: 'polonais' };
  const toneDescr = { formal: 'professionnel et formel', neutral: 'neutre et factuel', casual: 'simple et accessible' };
  const sys = `Tu es un expert en traitement documentaire. Restructure le contenu en HTML professionnel en ${langNames[lang]}, ton ${toneDescr[tone]}. Inclure : titres (h1-h3), paragraphes, listes, tableaux si pertinent. Réponds UNIQUEMENT avec le HTML interne (sans balises html/head/body/style).`;

  showLoader(t('analyzing'));
  try {
    let html = '';
    if (userData.settings.mock) {
      await new Promise(r => setTimeout(r, 1500));
      html = getMockResult(inputType, lang);
      addLog('Mock utilisé');
    } else {
      const messages = inputType === 'image'
        ? [{ role: 'user', content: [{ type: 'image', source: { type: 'base64', media_type: state.capturedImageType || 'image/jpeg', data: input } }, { type: 'text', text: sys + '\n\nAnalyse et restructure ce document image.' }] }]
        : [{ role: 'user', content: sys + '\n\nContenu :\n\n' + input }];
      html = await callClaudeAPI(messages);
      addLog('Réponse API reçue');
    }
    consumeScan();
    state.currentResult = html;
    document.getElementById('result-content').innerHTML = html;
    document.getElementById('sig-inserted-container').style.display = 'none';
    if (userData.settings.autosave) App.saveToHistory(true);
    updateTimeSavedDisplay();
    updateWorldRank();
    hideLoader();
    App.showSection('result');
    checkBadge('explorateur');
    checkBadge('champion');
    showToast('Document restructuré ✓', 'success');
  } catch (err) {
    hideLoader();
    showToast('Erreur IA : ' + err.message, 'error');
    addLog('Erreur API: ' + err.message);
  }
}

/* ---------- SIGNATURE ---------- */
function setupSignatureCanvas() {
  const canvas = document.getElementById('sig-canvas');
  if (!canvas) return;
  state.sigCanvas = canvas;
  state.sigCtx = canvas.getContext('2d');
}
function setupSigCanvas() {
  const canvas = state.sigCanvas;
  if (!canvas) return;
  const dpr = window.devicePixelRatio || 1;
  const rect = canvas.getBoundingClientRect();
  if (rect.width === 0) {
    setTimeout(setupSigCanvas, 150);
    return;
  }
  canvas.width = rect.width * dpr;
  canvas.height = rect.height * dpr;
  const ctx = state.sigCtx;
  ctx.scale(dpr, dpr);
  ctx.strokeStyle = getComputedStyle(document.documentElement).getPropertyValue('--text').trim() || '#1c1a17';
  ctx.lineWidth = 2.5;
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';
  function getPos(e) {
    const r = canvas.getBoundingClientRect();
    if (e.touches) return { x: e.touches[0].clientX - r.left, y: e.touches[0].clientY - r.top };
    return { x: e.clientX - r.left, y: e.clientY - r.top };
  }
  function start(e) {
    e.preventDefault();
    state.sigDrawing = true;
    const p = getPos(e);
    ctx.beginPath();
    ctx.moveTo(p.x, p.y);
  }
  function draw(e) {
    if (!state.sigDrawing) return;
    e.preventDefault();
    const p = getPos(e);
    ctx.lineTo(p.x, p.y);
    ctx.stroke();
  }
  function end() {
    state.sigDrawing = false;
    ctx.beginPath();
  }
  canvas.onmousedown = start;
  canvas.onmousemove = draw;
  canvas.onmouseup = end;
  canvas.onmouseleave = end;
  canvas.ontouchstart = start;
  canvas.ontouchmove = draw;
  canvas.ontouchend = end;
}

/* ---------- COMPRESSION IMAGE ---------- */
function compressImage(dataUrl, cb, maxW = 1280, q = 0.75) {
  const img = new Image();
  img.onload = () => {
    const scale = Math.min(1, maxW / Math.max(img.width, img.height));
    const canvas = document.createElement('canvas');
    canvas.width = img.width * scale;
    canvas.height = img.height * scale;
    const ctx = canvas.getContext('2d');
    if (!ctx) {
      cb(dataUrl); // fallback si canvas 2d non supporté
      return;
    }
    ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
    cb(canvas.toDataURL('image/jpeg', q));
  };
  img.src = dataUrl;
}

const App = {

    const old = document.getElementById('section-' + state.currentSection);
    if (old) old.classList.remove('active');
    const el = document.getElementById('section-' + name);
    if (el) el.classList.add('active');
    state.currentSection = name;
    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
    const nb = document.getElementById('nav-' + name);
    if (nb) nb.classList.add('active');
    document.getElementById('main-content')?.scrollTo({ top: 0, behavior: 'smooth' });
  },
  goScan() { this.showSection('scan'); this.startCamera(); },
  goImportFile() { this.showSection('scan'); this.triggerFileInput('image'); },
  goTextInput() { this.showSection('scan'); document.getElementById('text-input-card').style.display = 'block'; },
  setTheme(name) { applyTheme(name); if (userData) { userData.settings.theme = name; debouncedSaveUserData(); } showToast('Thème appliqué ✓', 'success'); checkBadge('hibou'); },
  toggleSetting(key, btn) {
    userData.settings[key] = !userData.settings[key];
    btn.className = 'toggle' + (userData.settings[key] ? ' on' : '');
    if (key === 'autoNight') setupAutoNight();
    debouncedSaveUserData();
  },
  setAiLang(lang) { userData.settings.aiLang = lang; debouncedSaveUserData(); },
  setDocFormat(f) { userData.settings.docFormat = f; debouncedSaveUserData(); },
  saveApiKey(key) { userData.apiKey = key.trim(); debouncedSaveUserData(); if (userData.apiKey) showToast('Clé API sauvegardée ✓', 'success'); },
  toggleApiKeyVisibility() { const i = document.getElementById('api-key-input'); if (i) i.type = i.type === 'password' ? 'text' : 'password'; },
  async startCamera() {
    if (!canScan()) { showLimitModal(); return; }
    document.getElementById('text-input-card').style.display = 'none';
    if (state.cameraStream) this.stopCamera();
    const container = document.getElementById('camera-container');
    const video = document.getElementById('camera-video');
    try {
      const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment', width: { ideal: 1920 } }, audio: false });
      state.cameraStream = stream;
      video.srcObject = stream;
      await video.play();
      container.classList.add('active');
      document.getElementById('preview-container').classList.remove('active');
    } catch (err) {
      showToast('Caméra inaccessible : ' + err.message, 'error');
      addLog('Erreur caméra: ' + err.message);
    }
  },
  stopCamera() {
    if (state.cameraStream) {
      state.cameraStream.getTracks().forEach(t => t.stop());
      state.cameraStream = null;
    }
    document.getElementById('camera-container').classList.remove('active');
  },
  capturePhoto() {
    const video = document.getElementById('camera-video');
    const canvas = document.getElementById('preview-canvas');
    const ctx = canvas.getContext('2d');
    canvas.width = video.videoWidth || 1280;
    canvas.height = video.videoHeight || 720;
    ctx.drawImage(video, 0, 0);
    const dataUrl = canvas.toDataURL('image/jpeg', 0.85);
    state.capturedImageB64 = dataUrl.split(',')[1];
    document.getElementById('preview-img').src = dataUrl;
    document.getElementById('preview-container').classList.add('active');
    this.stopCamera();
    showToast('Photo capturée ✓', 'success');
    addLog('Photo capturée');
  },
  resetScan() {
    state.capturedImageB64 = '';
    document.getElementById('preview-container').classList.remove('active');
    document.getElementById('camera-container').classList.remove('active');
  },
  triggerFileInput(type) {
    if (!canScan()) { showLimitModal(); return; }
    document.getElementById('text-input-card').style.display = 'none';
    document.getElementById(type === 'pdf' ? 'file-input-pdf' : 'file-input-image').click();
  },
  handleImageFile(event) {
    const file = event.target.files[0];
    if (!file) return;
    if (file.size > CONFIG.MAX_IMAGE_SIZE) {
      showToast('Image trop volumineuse (max 5 Mo)', 'error');
      return;
    }
    const reader = new FileReader();
    reader.onload = e => {
      const process = dataUrl => {
        state.capturedImageB64 = dataUrl.split(',')[1];
        state.capturedImageType = dataUrl.split(';')[0].split(':')[1] || 'image/jpeg';
        document.getElementById('preview-img').src = dataUrl;
        document.getElementById('preview-container').classList.add('active');
        showToast('Image importée ✓', 'success');
      };
      if (file.size > 2 * 1024 * 1024) compressImage(e.target.result, process);
      else process(e.target.result);
      state.currentDocName = file.name.replace(/\.[^.]+$/, '') || 'Document';
      addLog('Image importée: ' + file.name);
    };
    reader.readAsDataURL(file);
    event.target.value = '';
  },
  handlePdfFile(event) {
    const file = event.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = e => {
      state.capturedImageB64 = e.target.result.split(',')[1];
      state.currentDocName = file.name.replace(/\.[^.]+$/, '') || 'Document';
      addLog('PDF importé: ' + file.name);
      this.sendPdfToAI(file.name);
    };
    reader.readAsDataURL(file);
    event.target.value = '';
  },
  sendImageToAI() {
    if (!state.capturedImageB64) { showToast('Aucune image', 'error'); return; }
    processWithClaude(state.capturedImageB64, 'image');
  },
  sendPdfToAI(fn) {
    processWithClaude('Analyse le PDF "' + fn + '" et génère une structure HTML professionnelle.', 'text');
  },
  processText() {
    const raw = document.getElementById('raw-text-input').value.trim();
    if (!raw) { showToast('Champ vide', 'error'); return; }
    state.currentDocName = raw.substring(0, 30).replace(/\n/g, ' ') + '…';
    processWithClaude(raw, 'text');
  },
  exportPDF() {
    if (!state.currentResult) { showToast('Aucun résultat', 'error'); return; }
    addLog('Export PDF');
    const title = state.currentDocName || 'Document Flashdoc';
    const today = new Date().toLocaleDateString('fr-FR');
    const printableHtml = `<!DOCTYPE html>...`; // (votre template)
    const win = window.open('', '_blank');
    if (!win) { showToast('Popup bloqué', 'error'); return; }
    win.document.open();
    win.document.write(printableHtml);
    win.document.close();
    win.focus();
    win.print();
  },
  exportWord() {
    if (!state.currentResult) { showToast('Aucun résultat', 'error'); return; }
    if (!userData.isPremium) { premiumGate('exportWord'); return; }
    const html = `<html>...</html>`; // (votre template)
    triggerDownload(new Blob([html], { type: 'application/msword;charset=utf-8' }), state.currentDocName + '.doc');
    checkBadge('exporteur');
    addLog('Export Word');
    showToast('Export Word ✓', 'success');
  },
  exportExcel() {
    if (!state.currentResult) { showToast('Aucun résultat', 'error'); return; }
    if (!userData.isPremium) { premiumGate('exportExcel'); return; }
    const tmp = document.createElement('div');
    tmp.innerHTML = state.currentResult;
    let csv = '';
    const table = tmp.querySelector('table');
    if (table) {
      table.querySelectorAll('tr').forEach(row => {
        const cells = row.querySelectorAll('th,td');
        csv += Array.from(cells).map(c => '"' + c.textContent.replace(/"/g, '""').trim() + '"').join('\t') + '\n';
      });
    } else {
      csv = 'Type\tContenu\n';
      tmp.querySelectorAll('h1,h2,h3,p,li').forEach(el => {
        const tag = el.tagName.toLowerCase();
        const type = tag.startsWith('h') ? 'Titre ' + tag[1] : (tag === 'li' ? 'Item' : 'Para');
        csv += '"' + type + '"\t"' + el.textContent.replace(/"/g, '""').trim() + '"\n';
      });
    }
    triggerDownload(new Blob(['\uFEFF' + csv], { type: 'text/tab-separated-values;charset=utf-8' }), state.currentDocName + '.xls');
    checkBadge('exporteur');
    addLog('Export Excel');
    showToast('Export Excel ✓', 'success');
  },
  copyText() {
    if (!state.currentResult) { showToast('Aucun résultat', 'error'); return; }
    const tmp = document.createElement('div');
    tmp.innerHTML = state.currentResult;
    const text = tmp.textContent || '';
    if (navigator.clipboard) {
      navigator.clipboard.writeText(text).then(() => showToast('Texte copié ✓', 'success')).catch(() => this.fallbackCopy(text));
    } else this.fallbackCopy(text);
    addLog('Copie texte');
  },
  fallbackCopy(text) {
    const ta = document.createElement('textarea');
    ta.value = text;
    ta.style.cssText = 'position:fixed;opacity:0;';
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    showToast('Texte copié ✓', 'success');
  },
  async shareDoc() {
    if (!state.currentResult) { showToast('Aucun résultat', 'error'); return; }
    const tmp = document.createElement('div');
    tmp.innerHTML = state.currentResult;
    const text = tmp.textContent.substring(0, 500);
    if (navigator.share) {
      try { await navigator.share({ title: state.currentDocName, text, url: location.href }); addLog('Partage effectué'); }
      catch (e) { showToast('Partage annulé', 'info'); }
    } else { this.copyText(); showToast('API Share indisponible – texte copié', 'info'); }
  },
  saveToHistory(silent = false) {
    if (!state.currentResult) { if (!silent) showToast('Aucun résultat', 'error'); return; }
    const doc = {
      id: Date.now(),
      name: state.currentDocName || 'Document',
      html: state.currentResult,
      date: new Date().toISOString(),
      preview: stripHtml(state.currentResult).substring(0, 80),
      isFav: false
    };
    userData.history.unshift(doc);
    if (userData.history.length > 50) userData.history = userData.history.slice(0, 50);
    debouncedSaveUserData();
    renderHistory();
    renderHomeRecent();
    checkBadge('archiviste');
    if (!silent) showToast('Document enregistré ✓', 'success');
    addLog('Doc enregistré: ' + doc.name);
  },
  filterHistory(q) { state.histSearch = q; renderHistory(); },
  setHistFilter(filter, btn) {
    state.histFilter = filter;
    document.querySelectorAll('#section-history .btn-group .btn').forEach(b => b.classList.remove('btn-primary'));
    if (btn) btn.classList.add('btn-primary');
    renderHistory();
  },
  openHistoryDoc(id) {
    const doc = userData.history.find(d => d.id === id);
    if (!doc) return;
    state.currentResult = doc.html;
    state.currentDocName = doc.name;
    document.getElementById('result-content').innerHTML = doc.html;
    document.getElementById('sig-inserted-container').style.display = 'none';
    this.showSection('result');
    addLog('Doc ouvert: ' + doc.name);
  },
  toggleFavorite(id, event) {
    if (event) event.stopPropagation();
    const doc = userData.history.find(d => d.id === id);
    if (!doc) return;
    doc.isFav = !doc.isFav;
    if (doc.isFav) { if (!userData.favoriteIds.includes(id)) userData.favoriteIds.push(id); }
    else { userData.favoriteIds = userData.favoriteIds.filter(f => f !== id); }
    debouncedSaveUserData();
    renderHistory();
    renderHomeRecent();
    checkBadge('favori');
    showToast(doc.isFav ? '⭐ Ajouté aux favoris' : 'Retiré des favoris', 'info');
  },
  deleteHistoryDoc(id, event) {
    if (event) event.stopPropagation();
    if (!confirm('Supprimer ce document ?')) return;
    userData.history = userData.history.filter(d => d.id !== id);
    userData.favoriteIds = userData.favoriteIds.filter(f => f !== id);
    debouncedSaveUserData();
    renderHistory();
    renderHomeRecent();
    showToast('Document supprimé', 'info');
    addLog('Doc supprimé id:' + id);
  },
  clearHistory() {
    if (!userData.history.length) { showToast('Historique déjà vide', 'info'); return; }
    if (!confirm('Effacer tout l\'historique ?')) return;
    userData.history = [];
    userData.favoriteIds = [];
    debouncedSaveUserData();
    renderHistory();
    renderHomeRecent();
    showToast('Historique effacé', 'info');
  },
  openRenameDoc(id, event) {
    if (event) event.stopPropagation();
    state.renameDocId = id;
    const doc = userData.history.find(d => d.id === id);
    if (doc) document.getElementById('rename-input').value = doc.name;
    openModal('rename-modal');
  },
  confirmRename() {
    const name = document.getElementById('rename-input').value.trim();
    if (!name) { showToast('Nom requis', 'error'); return; }
    const doc = userData.history.find(d => d.id === state.renameDocId);
    if (doc) {
      doc.name = name;
      debouncedSaveUserData();
      renderHistory();
      renderHomeRecent();
      showToast('Renommé ✓', 'success');
    }
    closeModal('rename-modal');
  },
  openSignatureModal() { openModal('signature-modal'); setupSigCanvas(); },
  clearSignature() { if (state.sigCtx && state.sigCanvas) state.sigCtx.clearRect(0, 0, state.sigCanvas.width, state.sigCanvas.height); },
  loadSavedSignature() {
    if (!userData.savedSignature) { showToast('Aucune signature mémorisée', 'error'); return; }
    const img = new Image();
    img.onload = () => {
      if (!state.sigCtx || !state.sigCanvas) return;
      state.sigCtx.clearRect(0, 0, state.sigCanvas.width, state.sigCanvas.height);
      state.sigCtx.drawImage(img, 0, 0, state.sigCanvas.width / window.devicePixelRatio, state.sigCanvas.height / window.devicePixelRatio);
    };
    img.src = userData.savedSignature;
    showToast('Signature chargée', 'success');
  },
  saveSignatureForReuse() {
    if (!state.sigCanvas) return;
    const d = state.sigCtx.getImageData(0, 0, state.sigCanvas.width, state.sigCanvas.height);
    if (!d.data.some(v => v !== 0)) { showToast('Canvas vide', 'error'); return; }
    userData.savedSignature = state.sigCanvas.toDataURL('image/png');
    debouncedSaveUserData();
    showToast('Signature mémorisée ✓', 'success');
  },
  insertSignature() {
    if (!state.sigCanvas) return;
    const d = state.sigCtx.getImageData(0, 0, state.sigCanvas.width, state.sigCanvas.height);
    if (!d.data.some(v => v !== 0)) { showToast('Dessinez votre signature', 'error'); return; }
    const dataUrl = state.sigCanvas.toDataURL('image/png');
    document.getElementById('sig-inserted-img').src = dataUrl;
    const now = new Date();
    document.getElementById('sig-date-time').textContent = now.toLocaleDateString('fr-FR') + ' ' + now.toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit' });
    document.getElementById('sig-inserted-container').style.display = 'block';
    closeModal('signature-modal');
    checkBadge('signataire');
    showToast('Signature insérée ✓', 'success');
    addLog('Signature insérée');
  },
  openTranslateModal() {
    if (!state.currentResult) { showToast('Aucun document', 'error'); return; }
    openModal('translate-modal');
  },
  async translateDoc(targetLang) {
    if (!state.currentResult) { showToast('Aucun document', 'error'); return; }
    closeModal('translate-modal');
    const langNames = { fr: 'français', en: 'anglais', es: 'espagnol', de: 'allemand', it: 'italien', pt: 'portugais', nl: 'néerlandais', pl: 'polonais' };
    showLoader(t('translating'));
    try {
      let html = '';
      if (userData.settings.mock) {
        await new Promise(r => setTimeout(r, 1500));
        html = getMockResult('text', targetLang);
        addLog('Traduction simulée → ' + targetLang);
      } else {
        const prompt = 'Traduis le HTML suivant en ' + langNames[targetLang] + '. Conserve la structure HTML, traduis uniquement le texte. Réponds UNIQUEMENT avec le HTML traduit.\n\n' + state.currentResult;
        html = await callClaudeAPI([{ role: 'user', content: prompt }]);
        addLog('Traduction API → ' + targetLang);
      }
      state.currentResult = html;
      document.getElementById('result-content').innerHTML = html;
      checkBadge('polyglotte');
      hideLoader();
      showToast('Traduit en ' + langNames[targetLang] + ' ✓', 'success');
    } catch (err) {
      hideLoader();
      showToast('Erreur: ' + err.message, 'error');
    }
  },
  activatePremium() { openModal('payment-modal'); },
  confirmPremium() {
    userData.isPremium = true;
    userData.premiumActivatedAt = new Date().toISOString();
    debouncedSaveUserData();
    closeModal('payment-modal');
    updateScanCounter();
    renderProfileUI();
    checkBadge('vip');
    showToast('Premium activé ! 250 scans/mois ✓', 'success');
    addLog('Premium activé');
    document.getElementById('premium-banner-section').style.display = 'none';
  },
  resetQuota() {
    if (!confirm('Réinitialiser le quota ?')) return;
    userData.scansUsed = 0;
    debouncedSaveUserData();
    updateScanCounter();
    showToast('Quota réinitialisé ✓', 'success');
    addLog('Quota reset');
  },
  acceptCGU() {
    if (!userData) return;
    userData.cguAccepted = true;
    debouncedSaveUserData();
    closeModal('cgu-first-modal');
    showToast('Bienvenue sur Flashdoc ! 💡📄', 'success');
    addLog('CGU acceptées');
  },
};

/* ---------- ONBOARDING ---------- */
let obSlide = 0;
function obNext() {
  const slides = document.getElementById('ob-slides-container')?.children;
  if (!slides) return;
  if (obSlide < slides.length - 1) {
    obSlide++;
    Array.from(slides).forEach((s, i) => s.style.transform = `translateX(${(i - obSlide) * 100}%)`);
    document.querySelectorAll('.ob-dot').forEach((d, i) => d.classList.toggle('active', i === obSlide));
    const btn = document.getElementById('ob-next-btn');
    if (btn) btn.textContent = obSlide === slides.length - 1 ? t('finish') : t('next');
  } else {
    obFinish();
  }
}
function obSkip() { obFinish(); }
function obFinish() {
  document.getElementById('onboarding').classList.add('layer-hidden');
  localStorage.setItem('fd_ob_done', '1');
  document.getElementById('auth-screen').classList.remove('layer-hidden');
  applyI18n();
}

}

/* ---------- PWA / MANIFEST ---------- */
(function injectManifest() {
  const manifest = {
    name: 'Flashdoc – Scanner IA',
    short_name: 'Flashdoc',
    description: "Scannez et restructurez vos documents avec l'IA Claude",
    start_url: './',
    display: 'standalone',
    orientation: 'portrait',
    background_color: '#faf8f3',
    theme_color: '#e8540a',
    lang: 'fr',
    icons: [
      { src: 'data:image/svg+xml,' + encodeURIComponent('<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192"><rect width="192" height="192" rx="36" fill="#e8540a"/><text x="96" y="130" font-size="110" text-anchor="middle" fill="white">💡</text></svg>'), sizes: '192x192', type: 'image/svg+xml' },
      { src: 'data:image/svg+xml,' + encodeURIComponent('<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512"><rect width="512" height="512" rx="96" fill="#e8540a"/><text x="256" y="350" font-size="290" text-anchor="middle" fill="white">💡</text></svg>'), sizes: '512x512', type: 'image/svg+xml' }
    ]
  };
  const blob = new Blob([JSON.stringify(manifest)], { type: 'application/manifest+json' });
  const link = Object.assign(document.createElement('link'), { rel: 'manifest', href: URL.createObjectURL(blob) });
  document.head.appendChild(link);
})();

(function registerSW() {
  if (!('serviceWorker' in navigator)) return;
  const sw = `
const CACHE = 'flashdoc-v2';
const STATIC = ['/']; // à compléter si besoin
self.addEventListener('install', e => {
  e.waitUntil(caches.open(CACHE).then(c => c.addAll(STATIC).catch(() => {})));
  self.skipWaiting();
});
self.addEventListener('activate', e => {
  e.waitUntil(caches.keys().then(ks => Promise.all(ks.filter(k => k !== CACHE).map(k => caches.delete(k)))));
  self.clients.claim();
});
self.addEventListener('fetch', e => {
  const u = new URL(e.request.url);
  if (u.hostname === 'api.anthropic.com') return;
  e.respondWith(caches.match(e.request).then(cached => {
    if (cached) return cached;
    return fetch(e.request).then(r => {
      if (r.ok && e.request.method === 'GET') {
        const cl = r.clone();
        caches.open(CACHE).then(c => c.put(e.request, cl));
      }
      return r;
    }).catch(() => cached || new Response('Offline', { status: 503 }));
  }));
});`;
  navigator.serviceWorker.register(URL.createObjectURL(new Blob([sw], { type: 'application/javascript' }))).catch(() => {});
})();

let deferredPrompt = null;
window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  deferredPrompt = e;
  setTimeout(() => {
    const toast = document.createElement('div');
    toast.className = 'toast info';
    toast.style.cssText = 'pointer-events:all;cursor:pointer;padding:12px 15px;';
    toast.textContent = '📱 Installer Flashdoc sur votre écran d\'accueil ?';
    toast.onclick = () => {
      deferredPrompt.prompt();
      deferredPrompt.userChoice.then(c => {
        if (c.outcome === 'accepted') showToast('Flashdoc installé ✓', 'success');
        deferredPrompt = null;
      });
      toast.remove();
    };
    document.getElementById('toast-container')?.appendChild(toast);
    setTimeout(() => toast.remove(), 10000);
  }, 3000);
});

/* ---------- DÉMARRAGE ---------- */
document.addEventListener('DOMContentLoaded', () => {
  // Pré-appliquer le thème sauvegardé (anti-flash)
  try {
    const uid = localStorage.getItem(CONFIG.UID_KEY);
    if (uid) {
      const ud = JSON.parse(localStorage.getItem(CONFIG.DATA_PREFIX + uid) || 'null');
      if (ud?.settings?.theme && ud.settings.theme !== 'obsidian')
        document.documentElement.setAttribute('data-theme', ud.settings.theme);
    }
  } catch (e) {}

  // Onboarding ou Auth ?
  if (!localStorage.getItem('fd_ob_done')) {
    document.getElementById('onboarding').classList.remove('layer-hidden');
    const slides = document.getElementById('ob-slides-container')?.children;
    if (slides) {
      Array.from(slides).forEach((s, i) => { s.style.transform = `translateX(${i * 100}%)`; });
    }
    applyI18n();
  } else {
    const uid = localStorage.getItem(CONFIG.UID_KEY);
    if (uid) {
      const users = getUsers();
      const user = users.find(u => u.id === uid);
      if (user) {
        loginUser(user);
        return;
      }
    }
    document.getElementById('auth-screen').classList.remove('layer-hidden');
    applyI18n();
  }
});
